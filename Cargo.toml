[workspace]
resolver = "3"
members = [
    "crates/bluez-shared",
    "crates/bluetoothd",
    "crates/bluetoothctl",
    "crates/btmon",
    "crates/bluetooth-meshd",
    "crates/obexd",
    "crates/bluez-emulator",
    "crates/bluez-tools",
]

[workspace.package]
version = "5.86.0"
edition = "2024"
license = "GPL-2.0-or-later"
repository = "https://git.kernel.org/pub/scm/bluetooth/bluez.git"
rust-version = "1.85"

[workspace.dependencies]
tokio = { version = "1.50", features = ["full"] }
zbus = { version = "5.12", default-features = false, features = ["tokio"] }
nix = { version = "0.29", features = ["socket", "ioctl", "net"] }
libc = "0.2"
rust-ini = "0.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
rustyline = "14"
inventory = "0.3"
libloading = "0.8"
ring = "0.17"
criterion = { version = "0.5", features = ["html_reports"] }
zerocopy = { version = "0.8", features = ["derive"] }
bitflags = "2.6"
bytes = "1.7"
thiserror = "2.0"
tokio-stream = "0.1"
futures = "0.3"
quick-xml = "0.37"
aes = "0.8"
cmac = "0.7"
md-5 = "0.10"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "deny"
